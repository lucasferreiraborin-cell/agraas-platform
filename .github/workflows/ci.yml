name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --no-coverage --passWithNoTests
        env:
          # Provide minimal env vars so mocks work correctly
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder

  pgtap:
    name: pgTAP · Triggers críticos (anti-regressão)
    runs-on: ubuntu-latest
    # Só roda se o secret SUPABASE_DB_URL_SERVICE estiver configurado
    # (staging ou local CI). Caso contrário, é skip silencioso.
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if secret missing
        id: gate
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL_SERVICE }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Secret SUPABASE_DB_URL_SERVICE não configurado — pulando suíte pgTAP."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install psql
        if: steps.gate.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run pgTAP suite
        if: steps.gate.outputs.skip != 'true'
        env:
          SUPABASE_DB_URL_SERVICE: ${{ secrets.SUPABASE_DB_URL_SERVICE }}
        run: bash supabase/tests/run-all.sh

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    # Only deploy on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # IDs publicos do projeto (de .vercel/project.json). O unico segredo
      # necessario e VERCEL_TOKEN, configurado em Settings > Secrets > Actions.
      VERCEL_ORG_ID: team_Ma43Bsja5lsfxCmpolaWanXq
      VERCEL_PROJECT_ID: prj_gHHWszTrPJL9PtqiHM7bryyJjjA4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
